name: Release Plugin

on:
  push:
    tags:
      - '*'

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  build:
    runs-on: ubuntu-slim

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Extract release notes
        run: bun notes "${{ github.ref_name }}"

      - name: Install dependencies
        run: bun install

      - name: Detect release mode
        run: |
          if [[ "${{ github.ref_name }}" == *-* ]]; then
            echo "IS_PRERELEASE=true" >> $GITHUB_ENV
          else
            echo "IS_PRERELEASE=false" >> $GITHUB_ENV
          fi

      - name: Build plugin
        run: |
          if [ "$IS_PRERELEASE" = "true" ]; then
            bun dev
          else
            bun run build
          fi

      - name: Attest plugin artifacts
        uses: actions/attest@v4.1.0
        with:
          subject-path: |
            dist/main.js
            dist/manifest.json
            dist/styles.css

      - name: Create release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          prerelease_flag=""
          if [ "$IS_PRERELEASE" = "true" ]; then
            prerelease_flag="--prerelease"
          fi

          gh release create "$tag" \
            --title="$tag" \
            --notes-file=release-notes.md \
            $prerelease_flag \
            dist/main.js dist/manifest.json dist/styles.css
